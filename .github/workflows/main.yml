name: Build ADM Kakweia APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gerar Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.4 --distribution-type=bin
          chmod +x gradlew

      - name: Aceitar licenças Android SDK
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Compilar APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: ADM-Kakweia-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
